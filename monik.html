<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ Угадай место - Игра</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<!-- Овверлей загрузки -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Загрузка фотографий...</div>
    <div class="loading-subtext" id="loadingSubtext">Это займёт пару секунд</div>
</div>

<div class="game">
    <!-- ЭКРАН ЛОГИНА -->
    <div id="loginScreen" class="login-screen">
        <h1>🏙️ Угадай место</h1>
        <p>Введи своё имя и класс, чтобы начать игру</p>
        <input type="text" id="playerName" placeholder="Иванов Иван 1Г" maxlength="30">
        <div id="loginError" class="error-message">Напиши имя и класс!</div>
        <button onclick="login()">Начать игру 🚀</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="gameScreen" class="game-screen">
        <div class="header">
            <span class="player-info">👤 <span id="playerInfo"></span></span>
            <span class="score-board">💰 <span id="score">0</span></span>
        </div>

        <div class="game-content">
            <!-- ЛИДЕРБОРД СЛЕВА -->
            <div class="leaderboard-sidebar">
                <h3>🏆 Топ-10 игроков</h3>
                <div id="leaderboardList"></div>
            </div>

            <!-- ОСНОВНОЙ КОНТЕНТ СПРАВА -->
            <div class="game-main">
                <div class="level-info">
                    <span id="currentLevelName">Легкий уровень</span>
                    <span id="currentLevelBadge" class="level-badge level-easy">⭐</span>
                </div>

                <div id="photoContainer">
                    <img id="gameImage" src="" alt="Загрузка...">
                </div>

                <div class="progress" id="progressText"></div>

                <div id="optionsContainer" class="options"></div>

                <button id="nextLevelBtn" class="next-level-btn" onclick="goToNextLevel()">
                    Дальше → Средний уровень
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/game.js"></script>
</body>
</html>
